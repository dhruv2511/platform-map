apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-map
  labels:
    app: platform-map
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-map
  template:
    metadata:
      labels:
        app: platform-map
    spec:
      containers:
        - name: platform-map
          image: platform-map:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20