pipeline:
  name: platform-map-ci
  identifier: platform_map_ci
  orgIdentifier: default
  projectIdentifier: demo_project
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.github
        repoName: platform-map
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: CI
        identifier: CI
        description: Build, lint, and publish platform-map image
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.harness_k8s
              namespace: harness-delegate
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Read Version
                  identifier: read_version
                  spec:
                    connectorRef: account.harnessImage
                    image: docker.io/library/node:22-alpine
                    shell: Sh
                    command: |
                      cd platform-map
                      if [ ! -f VERSION ]; then
                        echo "VERSION file is missing"
                        exit 1
                      fi
                      APP_VERSION=$(tr -d '[:space:]' < VERSION)
                      if [ -z "$APP_VERSION" ]; then
                        echo "VERSION file is empty"
                        exit 1
                      fi
                      echo "Using app version: $APP_VERSION"
                    branch: main
                    outputVariables:
                      - name: APP_VERSION
                        type: String
                        value: APP_VERSION
              - step:
                  type: Run
                  name: Install Build Lint
                  identifier: install_build_lint
                  spec:
                    connectorRef: account.harnessImage
                    image: docker.io/library/node:22-alpine
                    shell: Sh
                    command: |
                      cd platform-map
                      npm ci
                      npm run lint
                      npm run build
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push Image
                  identifier: build_and_push
                  spec:
                    connectorRef: account.artifact_registry_docker
                    repo: europe-west2-docker.pkg.dev/shitsandgiggles/platform-map
                    tags:
                      - <+execution.steps.read_version.output.outputVariables.APP_VERSION>
                      - <+codebase.commitSha>
                      - latest
                    dockerfile: platform-map/Dockerfile
                    context: platform-map
  allowStageExecutions: true
